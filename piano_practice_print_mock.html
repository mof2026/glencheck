<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4eedf" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ピアノ練習" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ピアノ練習計画 印刷ページモック</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <style>
    :root {
      --bg: #f4eedf;
      --paper: #fbf7ef;
      --line: #d7ccb8;
      --ink: #1f1f1f;
      --muted: #665f55;
      --accent: #6e5643;
      --sheet-line: #d5d5d5;
      --shadow: 0 14px 36px rgba(55, 40, 26, 0.08);
    }

    * { box-sizing: border-box; }
    html {
      background-color: var(--bg);
    }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px 10px 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar a {
      color: var(--muted);
      text-decoration: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.12));
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 18px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .card {
      background: var(--paper);
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .card:last-child { margin-bottom: 0; }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-title {
      margin: 0;
      font-size: 13px;
      color: var(--accent);
    }

    .meta {
      font-size: 10px;
      color: var(--muted);
    }

    .label {
      font-size: 11px;
      color: var(--muted);
    }

    .field {
      border: 1px solid rgba(110, 86, 67, 0.16);
      border-radius: 10px;
      background: rgba(255,255,255,0.72);
      min-height: 34px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
    }

    .btn {
      border: 1px solid rgba(110, 86, 67, 0.18);
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      font-size: 11px;
      text-align: center;
      width: min(220px, 100%);
    }

    .btn.primary {
      background: linear-gradient(180deg, rgba(110,86,67,0.14), rgba(110,86,67,0.06));
      border-color: rgba(110, 86, 67, 0.28);
    }

    .sheet-card {
      background: #fff;
      border: 1px solid rgba(110, 86, 67, 0.12);
      border-radius: 14px;
      padding: 12px;
      overflow: auto;
    }

    .sheet {
      min-width: 1200px;
      background: #fff;
      color: #111;
      font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    }

    .sheet-date {
      font-size: 11px;
      margin-bottom: 6px;
      padding-right: 2px;
      text-align: right;
    }

    table.plan {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 11px;
      border: 1.2px solid #8f8576;
    }

    table.plan col.left { width: 30%; }
    table.plan col.day { width: auto; }

    table.plan td {
      border: 0.8px solid var(--sheet-line);
      padding: 0;
      vertical-align: top;
      height: 34px;
    }

    /* 曲名列と日付列の境界線は外枠と同じ強さにする */
    table.plan tr > td:nth-child(2) {
      border-left: 1.2px solid #8f8576;
    }

    tr.section-row td {
      height: 30px;
      vertical-align: middle;
      border-top: 1.2px solid #8f8576;
      border-bottom: 1.2px solid #8f8576;
      border-left: 0.8px solid var(--sheet-line);
      border-right: 0.8px solid var(--sheet-line);
    }

    .section-left {
      padding: 4px 5px;
      font-size: 12px;
      font-weight: 500;
    }

    .section-title-text {
      display: block;
      padding-left: 1.5em;
      line-height: 1.15;
    }

    .day {
      text-align: center;
      vertical-align: middle;
      font-size: 10px;
      white-space: nowrap;
      color: #222;
    }

    .left-cell {
      padding: 4px 5px;
    }

    .practice-wrap {
      padding-left: 2.1em;
      line-height: 1.2;
    }

    .left-cell .practice-wrap {
      min-height: 26px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .left-cell .practice-wrap.is-single-line {
      justify-content: center;
    }

    .practice-title, .practice-desc {
      margin: 0;
      font-size: 10.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .practice-desc {
      margin-top: 2px;
      color: #2d2d2d;
      font-size: 9.8px;
    }

    @media (min-width: 900px) {
      .layout {
        grid-template-columns: 320px 1fr;
        align-items: start;
      }
      .panel.sticky {
        position: sticky;
        top: 10px;
      }
    }

    @media (max-width: 899px) {
      .panel.sticky {
        width: min(248px, 100%);
        margin-left: 0;
        margin-right: auto;
      }
      .card {
        padding: 9px;
      }
      .label {
        font-size: 10px;
      }
      .field {
        min-height: 30px;
        padding: 6px 8px;
        font-size: 11px;
      }
      .actions {
        gap: 6px;
        margin-top: 7px;
      }
      .btn {
        min-height: 34px;
        padding: 8px;
        width: min(200px, 100%);
      }
    }

    @media print {
      body {
        background: #fff;
      }
      .topbar, .panel.sticky {
        display: none;
      }
      .wrap {
        max-width: none;
        padding: 0;
      }
      .layout {
        display: block;
      }
      .panel {
        border: none;
        box-shadow: none;
        background: transparent;
        padding: 0;
      }
      .sheet-card {
        border: none;
        border-radius: 0;
        padding: 0;
        overflow: visible;
      }
      .sheet {
        min-width: 0;
      }
      .sheet-date {
        text-align: right;
        padding-right: 2px;
      }
      @page {
        size: A4 landscape;
        margin: 10mm;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="./piano_practice_editor_mock_compact.html">← 編集に戻る</a>
    </div>

    <div class="layout">
      <aside class="panel sticky">
        <section class="card">
          <div class="actions">
            <button type="button" class="btn primary" id="print-btn">印刷 / PDF</button>
          </div>
        </section>
      </aside>

      <main class="panel">
      </main>
    </div>
  </div>
  <script src="./app/shared.js"></script>
  <script src="./app/print.js"></script>
</body>
</html>
