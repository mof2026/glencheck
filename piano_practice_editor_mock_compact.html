<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4eedf" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ピアノ練習" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>ピアノ練習計画 UIモック（iPhone実運用）</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4eedf;
      --paper: #fbf7ef;
      --paper-2: #f7efe3;
      --line: #d7ccb8;
      --ink: #1f1f1f;
      --muted: #665f55;
      --accent: #6e5643;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 14px 36px rgba(55, 40, 26, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 5%, rgba(255,255,255,0.6), transparent 42%),
        radial-gradient(circle at 85% 10%, rgba(110,86,67,0.08), transparent 44%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 10px 88px;
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      padding: 4px 10px 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .topbar .center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-family: inherit;
      font-weight: 500;
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0.02em;
      pointer-events: none;
      white-space: nowrap;
    }

    .topbar-date {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
      min-width: 112px;
      margin-right: 2px;
      margin-top: 35px;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .topbar-date-text {
      pointer-events: none;
    }

    .topbar-date-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .shell {
      border: 1px solid rgba(110, 86, 67, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.14));
      border-radius: 20px;
      padding: 8px;
      box-shadow: var(--shadow);
    }

    .section {
      background: var(--paper);
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.1));
      border-bottom: 1px solid rgba(110, 86, 67, 0.08);
    }

    .section-head.compact {
      border-bottom: none;
    }

    .section-title {
      margin: 0;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .section-meta {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-body {
      padding: 10px 12px 12px;
    }

    .field-grid {
      display: grid;
      gap: 8px;
    }

    #extra-curves {
      display: grid;
      gap: 8px;
    }

    #extra-curves:not(:empty) {
      margin-top: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
      align-items: center;
    }

    .field-row.with-tail {
      grid-template-columns: 70px minmax(0, 1fr) 26px;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
    }

    .field {
      border: 1px solid rgba(110, 86, 67, 0.16);
      border-radius: 10px;
      background: rgba(255,255,255,0.72);
      min-height: 34px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      font-size: 12px;
      line-height: 1.2;
    }

    .field.date-field {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.68));
      border-color: rgba(110, 86, 67, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      position: relative;
      padding-right: 34px;
    }

    .field-input {
      width: 100%;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 12px;
      padding: 0;
      margin: 0;
      outline: none;
    }

    .field-input[type="date"] {
      min-height: 18px;
      cursor: pointer;
    }

    .field-input[type="number"] {
      width: 100%;
    }

    .daycount-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
    }

    .day-shortcuts {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .day-shortcuts button {
      border: 1px solid rgba(110, 86, 67, 0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      color: var(--ink);
      font: inherit;
      font-size: 10px;
      padding: 4px 7px;
      line-height: 1;
    }

    @media (max-width: 420px) {
      .daycount-row {
        grid-template-columns: 1fr;
        gap: 5px;
        align-items: stretch;
      }

      .daycount-row > .field {
        min-width: 0;
      }

      .day-shortcuts {
        justify-content: flex-end;
      }
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 8px;
    }

    .inline-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chips.align-right {
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid rgba(110, 86, 67, 0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      padding: 5px 9px;
      font-family: inherit;
      font-weight: 400;
      font-size: 10px;
      line-height: 1;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .chip:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .curve-tail-btn {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(110, 86, 67, 0.16);
      background: rgba(255,255,255,0.5);
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .curve-tail-btn.clear-slot {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      color: rgba(110, 86, 67, 0.72);
    }

    .curve-tail-slot {
      width: 26px;
      height: 26px;
      display: block;
    }

    .curve-tail-slot.placeholder {
      visibility: hidden;
      pointer-events: none;
    }

    .accordion-item {
      border-top: 1px solid rgba(110, 86, 67, 0.08);
      background: rgba(255,255,255,0.18);
    }

    .accordion-item:first-child {
      border-top: none;
    }

    .accordion-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .accordion-title {
      margin: 0;
      font-size: 12px;
      color: var(--ink);
    }

    .accordion-sub {
      margin: 2px 0 0;
      font-size: 10px;
      color: var(--muted);
      display: none;
    }

    .caret {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .accordion-body {
      padding: 0 12px 10px;
    }

    .accordion-body > .chips + .practice-list {
      margin-top: 8px;
    }

    .accordion-item.is-collapsed .accordion-body {
      display: none;
    }

    .accordion-item.is-collapsed .caret {
      transform: rotate(180deg);
    }

    .practice-mini {
      border: 1px solid rgba(110, 86, 67, 0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.42);
      padding: 8px;
      margin-top: 6px;
    }

    .practice-mini:first-child {
      margin-top: 0;
    }

    .practice-mini .t {
      margin: 0;
      font-size: 11px;
      line-height: 1.3;
    }

    .practice-mini .d {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
    }

    .practice-mini input {
      width: 100%;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      outline: none;
      padding: 0;
      margin: 0;
    }

    .mini-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .mini-tools span {
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 9px;
      color: var(--ink);
      background: rgba(255,255,255,0.42);
    }

    .mini-tools button {
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 999px;
      padding: 3px 7px;
      font: inherit;
      font-size: 9px;
      color: var(--ink);
      background: rgba(255,255,255,0.42);
      line-height: 1;
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mini-tools button[data-row-action="up"],
    .mini-tools button[data-row-action="down"] {
      width: 22px;
      padding: 0;
    }

    .quick-add {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn {
      border: 1px solid rgba(110, 86, 67, 0.18);
      border-radius: 12px;
      background: rgba(255,255,255,0.5);
      padding: 9px 10px;
      text-align: center;
      font-size: 11px;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .preview-strip {
      border: 1px dashed rgba(110, 86, 67, 0.22);
      border-radius: 10px;
      background: rgba(255,255,255,0.36);
      padding: 8px;
      margin-top: 8px;
    }

    .preview-strip .head {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 35% repeat(4, 1fr);
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,0.36);
    }

    .preview-grid div {
      min-height: 20px;
      border-right: 1px solid rgba(110, 86, 67, 0.1);
      border-bottom: 1px solid rgba(110, 86, 67, 0.1);
      font-size: 8.5px;
      line-height: 1.15;
      padding: 2px 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .preview-grid div:nth-child(5n) { border-right: none; }
    .preview-grid .l {
      justify-content: flex-start;
      padding-left: 7px;
    }
    .preview-grid .h {
      background: rgba(255,255,255,0.6);
    }

    .sticky {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(244,238,223,0), rgba(244,238,223,0.9) 30%, rgba(244,238,223,0.98));
    }

    .sticky-inner {
      max-width: 430px;
      margin: 0 auto;
      display: grid;
      gap: 6px;
    }

    .sticky-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .sticky-actions {
      display: flex;
      align-items: center;
      gap: 0;
      position: absolute;
      right: 20px;
    }

    .sticky-btn {
      border-radius: 12px;
      border: 1px solid rgba(110, 86, 67, 0.18);
      padding: 8px 10px;
      text-align: center;
      font-size: 10px;
      line-height: 1.15;
      min-height: 34px;
      background: rgba(255,255,255,0.68);
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(55, 40, 26, 0.06);
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .sticky-btn.primary {
      background: linear-gradient(180deg, rgba(110,86,67,0.14), rgba(110,86,67,0.06));
      border-color: rgba(110, 86, 67, 0.28);
      color: #2a211b;
      width: min(188px, 100%);
      min-height: 34px;
      padding: 7px 12px;
      flex: 0 1 auto;
    }

    .sticky-btn.subtle {
      min-height: auto;
      padding: 0;
      font-size: 10px;
      border-radius: 0;
      color: rgba(42, 33, 27, 0.68);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      text-decoration: none;
      line-height: 1;
    }

    .sticky-btn.subtle:hover {
      color: rgba(42, 33, 27, 0.9);
    }

    .sticky-slash {
      color: rgba(42, 33, 27, 0.34);
      font-size: 10px;
      line-height: 1;
      padding: 0 5px;
      user-select: none;
    }

    .sticky-status {
      min-height: 14px;
      text-align: center;
      font-size: 9px;
      color: var(--muted);
      line-height: 1.2;
    }

    .candidate-sheet[hidden] {
      display: none;
    }

    .candidate-sheet {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(28, 22, 18, 0.28);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }

    .candidate-sheet-panel {
      width: min(430px, 100%);
      max-height: min(78vh, 620px);
      border-radius: 18px;
      border: 1px solid rgba(110, 86, 67, 0.2);
      background: linear-gradient(180deg, rgba(251,247,239,0.98), rgba(247,239,227,0.98));
      box-shadow: 0 20px 40px rgba(30, 22, 16, 0.18);
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }

    .candidate-sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(110, 86, 67, 0.1);
      background: rgba(255,255,255,0.38);
    }

    .candidate-sheet-title {
      margin: 0;
      font-size: 12px;
      color: var(--ink);
    }

    .candidate-sheet-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 10px;
    }

    .candidate-sheet-close {
      border: 1px solid rgba(110, 86, 67, 0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      color: var(--ink);
      font: inherit;
      font-size: 10px;
      line-height: 1;
      padding: 6px 9px;
    }

    .candidate-sheet-search {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(110, 86, 67, 0.08);
      background: rgba(255,255,255,0.22);
    }

    .candidate-search-input {
      width: 100%;
      border: 1px solid rgba(110, 86, 67, 0.18);
      border-radius: 10px;
      background: rgba(255,255,255,0.76);
      padding: 8px 10px;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      outline: none;
    }

    .candidate-sheet-body {
      overflow: auto;
      padding: 8px 12px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .candidate-group + .candidate-group {
      margin-top: 10px;
    }

    .candidate-group-head {
      font-size: 10px;
      color: var(--muted);
      margin: 0 0 5px;
      letter-spacing: 0.02em;
    }

    .candidate-list {
      display: grid;
      gap: 6px;
    }

    .candidate-option {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(110, 86, 67, 0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.62);
      padding: 8px 9px;
      color: var(--ink);
      font: inherit;
      line-height: 1.3;
    }

    .candidate-option .name {
      display: block;
      font-size: 11px;
    }

    .candidate-option .desc {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      color: var(--muted);
    }

    .candidate-empty {
      border: 1px dashed rgba(110, 86, 67, 0.18);
      border-radius: 10px;
      background: rgba(255,255,255,0.35);
      padding: 8px 9px;
      font-size: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="center">練習計画書</div>
      <label class="topbar-date" aria-label="作成日">
        <span id="created-date-display" class="topbar-date-text">--/--/-- 作成</span>
        <input id="created-date" class="topbar-date-input" type="date" />
      </label>
    </div>

    <div class="shell">
      <section id="practice-section" class="section">
        <div class="section-body">
          <div class="field-grid">
            <div class="field-row">
              <div class="label">開始日</div>
              <div class="field date-field"><input id="start-date" class="field-input" type="date" /></div>
            </div>
            <div class="field-row">
              <div class="label">日数</div>
              <div class="daycount-row">
                <div class="field"><select id="day-count" class="field-input"></select></div>
                <div class="day-shortcuts" aria-label="よく使う日数">
                  <button type="button" data-day="14">14</button>
                  <button type="button" data-day="21">21</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">曲</h2>
        </div>
        <div class="section-body">
          <div class="field-grid">
            <div class="field-row with-tail">
              <div class="label">1曲目</div>
              <div class="field"><input id="curve-0" class="field-input" type="text" value="インベンション8番" /></div>
              <button type="button" class="curve-tail-btn clear-slot" data-clear-curve-slot="0" aria-label="1曲目を空欄にする" title="空欄にする">-</button>
            </div>
            <div class="field-row with-tail">
              <div class="label">2曲目</div>
              <div class="field"><input id="curve-1" class="field-input" type="text" value="シンフォニア12番" /></div>
              <button type="button" class="curve-tail-btn clear-slot" data-clear-curve-slot="1" aria-label="2曲目を空欄にする" title="空欄にする">-</button>
            </div>
          </div>
          <div id="extra-curves"></div>
          <div class="chips align-right">
            <button id="add-curve-btn" type="button" class="chip">＋曲を追加</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head compact">
          <h2 class="section-title">練習内容</h2>
        </div>
        <div id="practice-accordion-list"></div>
      </section>

    </div>
  </div>

  <div class="sticky">
    <div class="sticky-inner">
      <div class="sticky-row">
        <a id="open-print-btn" class="sticky-btn primary" href="./piano_practice_print_mock.html">印刷ページへ</a>
        <div class="sticky-actions">
          <button id="backup-export-btn" type="button" class="sticky-btn subtle">保存</button>
          <span class="sticky-slash" aria-hidden="true">/</span>
          <button id="backup-import-btn" type="button" class="sticky-btn subtle">復元</button>
        </div>
      </div>
      <div id="sticky-status" class="sticky-status" aria-live="polite"></div>
    </div>
  </div>
  <input id="backup-import-file" type="file" accept="application/json,.json" hidden />
  <div id="candidate-sheet" class="candidate-sheet" hidden aria-hidden="true">
    <div class="candidate-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="candidate-sheet-title">
      <div class="candidate-sheet-head">
        <div>
          <p id="candidate-sheet-title" class="candidate-sheet-title">候補から追加</p>
          <p id="candidate-sheet-sub" class="candidate-sheet-sub">曲ごとの候補を選択</p>
        </div>
        <button id="candidate-sheet-close" type="button" class="candidate-sheet-close">閉じる</button>
      </div>
      <div class="candidate-sheet-search">
